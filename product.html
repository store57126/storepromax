<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل المنتج - TECHSTORE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-placeholder"></div>

<div class="ts-page" id="productPage">
  <div class="ts-loading"><div class="ts-spinner"></div> جاري التحميل...</div>
</div>

<div id="footer-placeholder"></div>

<script src="js/db.js"></script>
<script src="js/components.js"></script>
<script>
let product = null;
let selectedColor = null;
let selectedStorage = null;
let qty = 1;
let currentImg = 0;

function getPrice() {
  let price = product.price;
  if (selectedStorage) {
    const s = product.storage.find(s => s.size === selectedStorage);
    if (s) price += s.price;
  }
  if (selectedColor) {
    const c = product.colors.find(c => c.name === selectedColor);
    if (c) price += c.price;
  }
  return price;
}

function render() {
  const wished = DB.isWishlisted(product.id);
  const reviews = DB.getReviews(product.id);
  const avgRating = reviews.length ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length) : product.rating;

  document.getElementById('productPage').innerHTML = `
  <div class="ts-breadcrumb">
    <a href="index.html">الرئيسية</a> ›
    <a href="products.html">المنتجات</a> ›
    <a href="products.html?cat=${product.category}">الفئة</a> ›
    <span>${product.name}</span>
  </div>

  <div class="ts-product-detail">
    <!-- Images -->
    <div>
      <div class="ts-main-img ts-img-slider" id="mainImgWrap">
        <img src="${product.images[currentImg]}" alt="${product.name}" id="mainImg" onerror="this.src='https://placehold.co/500x400/0D1B30/60A5FA?text=📦'">
        ${product.images.length > 1 ? `
          <div class="ts-img-arrow prev" onclick="prevImg()">›</div>
          <div class="ts-img-arrow next" onclick="nextImg()">‹</div>
        ` : ''}
        ${product.discount ? `<div class="ts-discount-badge" style="top:16px;right:16px;">${product.discount}% خصم</div>` : ''}
      </div>
      ${product.images.length > 1 ? `
        <div class="ts-thumb-list" id="thumbList">
          ${product.images.map((img, i) => `
            <div class="ts-thumb ${i===0?'active':''}" onclick="selectImg(${i})" id="thumb_${i}">
              <img src="${img}" alt="" onerror="this.src='https://placehold.co/60x60/0D1B30/60A5FA?text=📦'">
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>

    <!-- Details -->
    <div>
      ${product.featured ? '<div style="display:inline-block;background:rgba(245,158,11,0.2);border:1px solid var(--gold);color:var(--gold);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;">🔥 الأكثر مبيعاً</div>' : ''}
      <h1 style="font-size:28px;font-weight:900;margin-bottom:10px;">${product.name}</h1>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
        <span style="color:var(--gold);font-size:18px;">${renderStars(avgRating)}</span>
        <span style="font-weight:700;">${avgRating.toFixed(1)}</span>
        <span style="color:var(--text3);font-size:13px;">(${reviews.length} تقييم)</span>
      </div>

      <div style="margin-bottom:20px;">
        <div style="font-size:36px;font-weight:900;color:var(--blue3);" id="currentPrice">${formatPrice(getPrice())}</div>
        ${product.oldPrice ? `
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
            <span style="color:var(--text3);font-size:16px;text-decoration:line-through;">${formatPrice(product.oldPrice)}</span>
            <span style="color:var(--green);font-size:13px;font-weight:700;">وفر ${formatPrice(product.oldPrice - product.price)} (${product.discount}%)</span>
          </div>
        ` : ''}
      </div>

      <p style="color:var(--text2);font-size:14px;line-height:1.8;margin-bottom:20px;">${product.description}</p>

      ${product.colors.length > 0 ? `
        <div style="margin-bottom:16px;">
          <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;">اختر اللون</div>
          <div class="ts-color-opts" id="colorOpts">
            ${product.colors.map((c, i) => `
              <div class="ts-color-opt ${i===0?'active':''}" onclick="selectColor('${c.name}', this)">
                <div class="ts-color-dot" style="background:${c.hex};"></div>
                ${c.name}${c.price > 0 ? ' (+' + formatPrice(c.price) + ')' : ''}
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}

      ${product.storage.length > 0 ? `
        <div style="margin-bottom:16px;">
          <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;">اختر السعة</div>
          <div class="ts-storage-opts" id="storageOpts">
            ${product.storage.map((s, i) => `
              <div class="ts-storage-opt ${i===0?'active':''}" onclick="selectStorage('${s.size}', this)">
                ${s.size}${s.price > 0 ? ' (+' + formatPrice(s.price) + ')' : ''}
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}

      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
        <div class="ts-qty-lg">
          <button class="ts-qty-lg-btn" onclick="changeQty(-1)">−</button>
          <span class="ts-qty-lg-val" id="qtyVal">1</span>
          <button class="ts-qty-lg-btn" onclick="changeQty(1)">+</button>
        </div>
        <span style="font-size:13px;color:${product.stock > 5 ? 'var(--green)' : product.stock > 0 ? 'var(--gold)' : 'var(--red)'}">
          ${product.stock > 5 ? '✅ متوفر' : product.stock > 0 ? `⚠️ متبقي ${product.stock} فقط` : '❌ غير متوفر'}
        </span>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="ts-btn ts-btn-primary" style="flex:1;font-size:16px;" onclick="addToCart()" ${product.stock===0?'disabled':''}>
          🛒 أضف إلى السلة
        </button>
        <button class="ts-btn ts-btn-outline ${wished?'':'text-red'}" id="wishBtn" onclick="toggleWish()">
          ${wished ? '❤️' : '🤍'} المفضلة
        </button>
      </div>

      <!-- Delivery info -->
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:20px;">🚚</span>
            <div><div style="font-size:12px;font-weight:700;">توصيل مجاني</div><div style="font-size:11px;color:var(--text3);">للطلبات فوق 500 جنيه</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:20px;">🛡️</span>
            <div><div style="font-size:12px;font-weight:700;">ضمان سنة كاملة</div><div style="font-size:11px;color:var(--text3);">ضمان عيوب التصنيع</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:20px;">🔄</span>
            <div><div style="font-size:12px;font-weight:700;">إرجاع 14 يوم</div><div style="font-size:11px;color:var(--text3);">إرجاع سهل بدون أي أسئلة</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:20px;">💳</span>
            <div><div style="font-size:12px;font-weight:700;">الدفع عند الاستلام</div><div style="font-size:11px;color:var(--text3);">ادفع عند استلام المنتج</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Reviews Section -->
  <div style="margin-top:40px;">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;">
      <h3 style="font-size:18px;font-weight:800;margin-bottom:20px;">تقييمات العملاء (${reviews.length})</h3>

      <div style="display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center;margin-bottom:24px;">
        <div style="text-align:center;">
          <div style="font-size:48px;font-weight:900;color:var(--blue3);">${avgRating.toFixed(1)}</div>
          <div style="color:var(--gold);font-size:20px;">${renderStars(avgRating)}</div>
          <div style="color:var(--text3);font-size:12px;">${reviews.length} تقييم</div>
        </div>
        <div>
          ${[5,4,3,2,1].map(star => {
            const count = reviews.filter(r => r.rating === star).length;
            const pct = reviews.length ? Math.round(count/reviews.length*100) : 0;
            return `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <span style="color:var(--gold);font-size:12px;width:40px;">${star} ★</span>
              <div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;">
                <div style="width:${pct}%;height:100%;background:var(--gold);border-radius:3px;"></div>
              </div>
              <span style="font-size:12px;color:var(--text3);width:30px;">${count}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Add Review -->
      <div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:20px;">
        <h4 style="font-size:15px;font-weight:700;margin-bottom:16px;">اكتب تقييمك</h4>
        <div style="margin-bottom:12px;">
          <div style="font-size:13px;color:var(--text2);margin-bottom:6px;">تقييمك</div>
          <div class="ts-star-input" id="starInput">
            <span onclick="setRating(1)" data-star="1">★</span>
            <span onclick="setRating(2)" data-star="2">★</span>
            <span onclick="setRating(3)" data-star="3">★</span>
            <span onclick="setRating(4)" data-star="4">★</span>
            <span onclick="setRating(5)" data-star="5">★</span>
          </div>
        </div>
        <div class="ts-form-group">
          <input type="text" class="ts-input" id="reviewName" placeholder="اسمك">
        </div>
        <div class="ts-form-group">
          <textarea class="ts-input" id="reviewText" placeholder="اكتب تجربتك مع المنتج..." rows="3"></textarea>
        </div>
        <button class="ts-btn ts-btn-primary" onclick="submitReview()">إرسال التقييم</button>
      </div>

      <!-- Reviews List -->
      <div id="reviewsList">
        ${reviews.map(r => `
        <div style="border-top:1px solid var(--border);padding:16px 0;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;">👤</div>
            <div>
              <div style="font-size:14px;font-weight:700;">${r.name}</div>
              <div style="color:var(--gold);font-size:13px;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
            </div>
            <div style="margin-right:auto;color:var(--text3);font-size:12px;">${r.date}</div>
          </div>
          <p style="font-size:14px;color:var(--text2);line-height:1.6;">${r.comment}</p>
        </div>
        `).join('')}
        ${reviews.length === 0 ? '<div style="text-align:center;color:var(--text3);padding:20px;">لا توجد تقييمات بعد. كن أول من يقيّم!</div>' : ''}
      </div>
    </div>
  </div>

  <!-- Similar Products -->
  <div style="margin-top:16px;">
    <div class="ts-section-title">منتجات مشابهة <a href="products.html?cat=${product.category}">عرض الكل</a></div>
    <div class="ts-grid" id="similarGrid"></div>
  </div>
  `;

  // Set initial selections
  if (product.colors.length > 0) selectedColor = product.colors[0].name;
  if (product.storage.length > 0) selectedStorage = product.storage[0].size;

  // Similar products
  const similar = DB.getProducts({ category: product.category }).filter(p => p.id !== product.id).slice(0, 4);
  document.getElementById('similarGrid').innerHTML = similar.map(p => {
    const w = DB.isWishlisted(p.id);
    return `
    <div class="ts-product-card">
      <div class="ts-product-img">
        <a href="product.html?id=${p.id}"><img src="${p.images[0]}" alt="${p.name}" onerror="this.src='https://placehold.co/300x220/0D1B30/60A5FA?text=📦'"></a>
        ${p.discount ? `<div class="ts-discount-badge">${p.discount}% خصم</div>` : `<div class="ts-new-badge">جديد</div>`}
        <div class="ts-wish-btn ${w?'active':''}" onclick="toggleWishSimilar(${p.id}, this)">${w ? '❤️' : '🤍'}</div>
      </div>
      <div class="ts-product-body">
        <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit"><div class="ts-product-name">${p.name}</div></a>
        <div class="ts-product-rating"><span class="ts-stars">${renderStars(p.rating)}</span><span class="ts-rating-count">(${p.reviews})</span></div>
        <div class="ts-product-price"><span class="ts-price">${formatPrice(p.price)}</span>${p.oldPrice ? `<span class="ts-old-price">${formatPrice(p.oldPrice)}</span>` : ''}</div>
        <button class="ts-btn ts-btn-primary ts-btn-full ts-btn-sm" onclick="quickAdd(${p.id})">🛒 أضف للسلة</button>
      </div>
    </div>
    `;
  }).join('');
}

function selectImg(idx) {
  currentImg = idx;
  document.getElementById('mainImg').src = product.images[idx];
  document.querySelectorAll('.ts-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
}
function prevImg() { selectImg((currentImg + 1) % product.images.length); }
function nextImg() { selectImg((currentImg - 1 + product.images.length) % product.images.length); }

function selectColor(name, el) {
  selectedColor = name;
  document.querySelectorAll('#colorOpts .ts-color-opt').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  updatePrice();
}
function selectStorage(size, el) {
  selectedStorage = size;
  document.querySelectorAll('#storageOpts .ts-storage-opt').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  updatePrice();
}
function updatePrice() {
  document.getElementById('currentPrice').textContent = formatPrice(getPrice());
}
function changeQty(d) {
  qty = Math.max(1, Math.min(product.stock || 99, qty + d));
  document.getElementById('qtyVal').textContent = qty;
}
function addToCart() {
  DB.addToCart(product.id, qty, selectedColor, selectedStorage);
  showToast('تمت الإضافة للسلة 🛒');
  openCart();
}
function toggleWish() {
  const added = DB.toggleWishlist(product.id);
  document.getElementById('wishBtn').innerHTML = (added ? '❤️' : '🤍') + ' المفضلة';
  showToast(added ? 'تمت الإضافة للمفضلة ❤️' : 'تمت الإزالة من المفضلة');
}
function toggleWishSimilar(id, el) {
  const added = DB.toggleWishlist(id);
  el.innerHTML = added ? '❤️' : '🤍';
  el.classList.toggle('active', added);
  showToast(added ? 'تمت الإضافة للمفضلة ❤️' : 'تمت الإزالة من المفضلة');
}
function quickAdd(id) {
  DB.addToCart(id);
  showToast('تمت الإضافة للسلة 🛒');
  openCart();
}

let userRating = 0;
function setRating(r) {
  userRating = r;
  document.querySelectorAll('#starInput span').forEach((s, i) => s.classList.toggle('active', i < r));
}
function submitReview() {
  const name = document.getElementById('reviewName').value.trim();
  const text = document.getElementById('reviewText').value.trim();
  if (!name || !text || !userRating) { showToast('يرجى ملء جميع البيانات واختيار التقييم', 'error'); return; }
  DB.addReview({ productId: product.id, name, comment: text, rating: userRating });
  showToast('تم إرسال تقييمك بنجاح ✅');
  render();
}

window.selectImg = selectImg; window.prevImg = prevImg; window.nextImg = nextImg;
window.selectColor = selectColor; window.selectStorage = selectStorage;
window.changeQty = changeQty; window.addToCart = addToCart; window.toggleWish = toggleWish;
window.toggleWishSimilar = toggleWishSimilar; window.quickAdd = quickAdd;
window.setRating = setRating; window.submitReview = submitReview;

document.addEventListener('DOMContentLoaded', () => {
  initPage();
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'products.html'; return; }
  product = DB.getProduct(id);
  if (!product) { location.href = 'products.html'; return; }
  document.title = product.name + ' - TECHSTORE';
  render();
});
</script>
</body>
</html>
